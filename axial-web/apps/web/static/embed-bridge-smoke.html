<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Axial Bridge Smoke</title>
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
			}

			iframe {
				display: block;
				width: 100%;
				height: 100%;
				border: 0;
			}
		</style>
	</head>
	<body>
		<iframe id="axial-frame" title="Axial" src="/?embed=1&amp;bridge=1"></iframe>
		<script>
			const frame = document.querySelector('#axial-frame');
			window.axialBridgeMessages = [];
			window.axialBridgeSend = (message) => {
				frame.contentWindow.postMessage(
					{
						source: 'axial-host',
						version: 1,
						...message
					},
					window.location.origin
				);
			};

			window.addEventListener('message', (event) => {
				if (event.source !== frame.contentWindow) return;
				window.axialBridgeMessages.push(event.data);
			});
		</script>
	</body>
</html>
